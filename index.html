<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Status de Envio - Fazendas</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

</head>
<body>

<div class="app">

    <!-- =====================================================
        BARRA SUPERIOR
    ====================================================== -->

    <header class="toolbar">

        <div class="toolbar-left">

            <h1>STATUS DE ENVIO DOS CONTROLES</h1>

            <span class="toolbar-subtitle">
                Painel de acompanhamento das fazendas
            </span>

        </div>

        <div class="toolbar-center">

            <div class="connection-box">

                <span id="connectionIndicator" class="connection-status">

                    🔴 Nenhuma planilha conectada

                </span>

                <div id="currentWorkbook" class="connection-list">

                    Selecione uma planilha

                </div>

            </div>

        </div>

        <div class="toolbar-right">

            <button id="openWorkbookModal" class="btn-primary">
                📂 Planilhas
            </button>

            <button id="processBtn" class="btn-secondary">
                🔄 Atualizar
            </button>

            <button id="exportBtn" class="btn-secondary">
                📸 Exportar
            </button>

            <button id="configMenuBtn" class="btn-config">
                ⚙
            </button>

        </div>

    </header>

    <!-- =====================================================
        MENU CONFIGURAÇÕES
    ====================================================== -->

    <div id="configMenu" class="config-menu">

        <button id="toggleConfigBtn">

            👁 Mostrar / Ocultar edição

        </button>

        <button id="resetBtn">

            🗑 Limpar todos os dados

        </button>

    </div>

    <!-- =====================================================
        FILTROS
    ====================================================== -->

    <div class="filter-bar">

        <div class="filter-item">

            <label>Data Inicial</label>

            <input
                type="date"
                id="reportStartDate"
                class="date-input">

        </div>

        <div class="filter-item">

            <label>Data Final</label>

            <input
                type="date"
                id="reportEndDate"
                class="date-input">

        </div>

        <button
            id="todayBtn"
            class="btn-secondary">

            📅 Hoje

        </button>

        <button
            id="last7Btn"
            class="btn-secondary">

            📆 Últimos 7 dias

        </button>

    </div>

    <!-- =====================================================
        MODAL PLANILHAS
    ====================================================== -->

    <div
        id="workbookModal"
        class="modal"
        style="display:none;">

        <div class="modal-content">

            <h2>Escolha uma planilha</h2>

            <div id="workbookList">

                <button class="workbook-option" data-id="campo">
                    🚜 Operações em Campo
                </button>

                <button class="workbook-option" data-id="abastecimento">
                    ⛽ Abastecimento
                </button>

                <button class="workbook-option" data-id="diario">
                    📋 Diário de Campo
                </button>

                <button class="workbook-option" data-id="mensal">
                    🐄 Mapa Mensal do Rebanho
                </button>

                <button class="workbook-option" data-id="divergencias">
                    ⚖ Divergências Diário x Sistema
                </button>

            </div>

            <div class="modal-actions">

                <button
                    id="closeWorkbookModal"
                    class="btn-secondary">

                    Cancelar

                </button>

                <button
                    id="disconnectWorkbook"
                    class="btn-danger">

                    Remover vínculo

                </button>

            </div>

        </div>

    </div>

    <!-- =====================================================
        CONFIRMAR LIMPEZA
    ====================================================== -->

    <div
        id="confirmOverlay"
        class="confirm-overlay"
        style="display:none;">

        <div class="confirm-box">

            <p>

                Isso apagará todos os dados.

                Deseja continuar?

            </p>

            <div class="confirm-actions">

                <button
                    id="confirmCancel"
                    class="btn-secondary">

                    Cancelar

                </button>

                <button
                    id="confirmOk"
                    class="btn-danger">

                    Limpar tudo

                </button>

            </div>

        </div>

    </div>

    <!-- =====================================================
        PAINEL DE CONFIGURAÇÃO
    ====================================================== -->

    <div
        id="configPanel"
        class="panel-config">

        <h2>Configurações Gerais</h2>

        <div class="config-row" style="display:none;">

            <label>Empresa</label>

            <input
                id="companyName"
                type="text">

        </div>

        <div class="config-row">

            <label>Título</label>

            <input
                id="reportTitle"
                type="text">

        </div>

        <div class="config-row">

            <label>Período</label>

            <input
                id="periodLabel"
                type="text">

        </div>

        <div class="config-row">

            <label>Aviso</label>

            <input
                id="bannerText"
                type="text">

        </div>

        <h2>Painéis</h2>

        <div id="panelSelectList"></div>

        <div
            id="selectWarning"
            style="display:none;">

        </div>

        <h2>Fazendas</h2>

        <div id="farmList"></div>

        <button
            id="addFarmBtn"
            class="add-chip">

            + Adicionar fazenda

        </button>

        <h2>Dias</h2>

        <div id="dayList"></div>

        <button
            id="addDayBtn"
            class="add-chip">

            + Adicionar dia

        </button>

    </div>

    <!-- =====================================================
        RELATÓRIO
    ====================================================== -->

    <div id="report">

        <div class="rep-header">

            <div class="rep-header-top">

                <p
                    id="titleDisplay"
                    class="rep-title">

                </p>

                <div class="rep-logo">

                    <img
                        src="logo.png"
                        id="logoImg"
                        class="rep-logo-img">

                </div>

            </div>

            <div class="rep-period-box">

                PERÍODO:
                <span id="periodDisplay"></span>

            </div>

        </div>

        <div
            id="bannerDisplay"
            class="rep-banner">

        </div>

        <div
            id="reportGrid"
            class="rep-grid">

        </div>

        <div class="rep-bottombar">

            DISCIPLINA NA INFORMAÇÃO • EXCELÊNCIA NA GESTÃO

        </div>

    </div>

</div>

<script src="app.js"></script>

</body>
</html>
